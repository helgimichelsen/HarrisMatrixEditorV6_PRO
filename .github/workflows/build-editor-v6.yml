name: Build Harris Matrix Editor V6 PRO EXE

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Hent repository
        uses: actions/checkout@v4

      - name: Installer Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Installer dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install -r requirements.txt

      - name: Byg EXE
        run: |
          pyinstaller HarrisMatrixEditorV6PRO.spec

      - name: Vis dist-indhold
        run: |
          dir dist

      - name: Upload EXE som artifact
        uses: actions/upload-artifact@v4
        with:
          name: HarrisMatrixEditorV6PRO-Windows-EXE
          path: dist/HarrisMatrixEditorV6PRO.exe
